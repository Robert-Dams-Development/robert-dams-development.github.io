        <h2 data-nl="3. Offertes en aanbiedingen" data-en="3. Quotations and offers"></h2>
        <p data-nl="Alle offertes en aanbiedingen van Dams Development zijn vrijblijvend en geldig gedurende 30 dagen na dagtekening, tenzij anders vermeld."
           data-en="All quotations and offers issued by Dams Development are without obligation and valid for 30 days from their date, unless stated otherwise."></p>
        <p data-nl="Offertes zijn gebaseerd op de informatie die opdrachtgever bij aanvraag heeft verstrekt. Indien deze informatie achteraf onvolledig of onjuist blijkt, kan Dams Development de offerte aanpassen."
           data-en="Quotations are based on the information provided by the client at the time of the request. If that information later proves incomplete or incorrect, Dams Development is entitled to revise the quotation."></p>
        <p data-nl="Een samengestelde prijsopgave verplicht Dams Development niet tot het verrichten van een gedeelte van de opdracht tegen een overeenkomstig deel van de opgegeven prijs."
           data-en="A composite price quotation does not oblige Dams Development to perform any part of the assignment for a corresponding part of the quoted price."></p>

        <h2 data-nl="4. Totstandkoming en uitvoering van de overeenkomst" data-en="4. Formation and performance of the agreement"></h2>
        <p data-nl="De overeenkomst komt tot stand op het moment van schriftelijke aanvaarding door opdrachtgever van de offerte van Dams Development, of zoveel eerder als feitelijk uitvoering wordt gegeven aan de overeenkomst."

        <p data-nl="Dams Development zal de overeenkomst naar beste inzicht en vermogen uitvoeren, conform de eisen van goed vakmanschap. Op Dams Development rust een inspanningsverplichting, geen resultaatsverplichting, tenzij uitdrukkelijk en schriftelijk anders is overeengekomen."
           data-en="Dams Development shall perform the agreement to the best of its insight and ability and in accordance with sound professional standards. Dams Development bears a best-efforts obligation, not a result obligation, unless expressly agreed otherwise in writing."></p>
        <p data-nl="Dams Development is gerechtigd om bij de uitvoering van de overeenkomst derden in te schakelen, waaronder ook AI-diensten en softwareleveranciers, voor zover dat redelijkerwijs nodig is voor een goede uitvoering."
           data-en="Dams Development is entitled to engage third parties in the performance of the agreement, including AI services and software vendors, where reasonably necessary for proper performance."></p>
        <p data-nl="Opdrachtgever draagt er zorg voor dat alle gegevens, toegangen en faciliteiten waarvan Dams Development aangeeft dat deze noodzakelijk zijn, tijdig worden verstrekt. Vertraging in de uitvoering die hieruit voortvloeit, komt voor rekening en risico van opdrachtgever."

        <p data-nl="Genoemde termijnen voor (deel)opleveringen zijn indicatief en gelden niet als fatale termijnen, tenzij dit uitdrukkelijk schriftelijk is overeengekomen."
           data-en="Stated delivery deadlines are indicative and do not constitute strict deadlines unless expressly agreed in writing."></p>

        <p data-nl="Indien tijdens de uitvoering blijkt dat het voor een goede uitvoering noodzakelijk is om de overeenkomst te wijzigen of aan te vullen, treden partijen tijdig en in overleg met elkaar in contact om de overeenkomst aan te passen."
           data-en="If during performance it becomes apparent that adjustment or supplementation of the agreement is required for proper execution, the parties shall consult one another in good time to amend the agreement."></p>
        <p data-nl="Werkzaamheden die buiten de oorspronkelijke opdracht vallen (meerwerk) worden afzonderlijk in rekening gebracht volgens het op dat moment gehanteerde uurtarief van Dams Development, tenzij anders schriftelijk overeengekomen."
           data-en="Work falling outside the original scope (additional work) is invoiced separately at Dams Development&rsquo;s then-current hourly rate, unless agreed otherwise in writing."></p>

           data-en="All rates and prices used by Dams Development are in euros and exclusive of VAT and any travel, accommodation, or other expenses, unless otherwise stated."></p>
        <p data-nl="Dams Development is gerechtigd haar tarieven jaarlijks per 1 januari te indexeren conform de CBS Consumentenprijsindex (CPI), reeks &lsquo;Alle huishoudens&rsquo;, zonder voorafgaande mededeling."
           data-en="Dams Development is entitled to adjust its rates annually on 1 January in line with the Dutch CBS Consumer Price Index (CPI), series &lsquo;All households&rsquo;, without prior notice."></p>

        <h2 data-nl="7. Facturering en betaling" data-en="7. Invoicing and payment"></h2>
        <p data-nl="Tenzij anders overeengekomen factureert Dams Development maandelijks achteraf op basis van bestede uren, of conform de in de offerte vastgelegde milestones."
           data-en="Unless agreed otherwise, Dams Development invoices monthly in arrears on the basis of hours spent, or in accordance with the milestones defined in the quotation."></p>
        <p data-nl="De betalingstermijn bedraagt 30 dagen na factuurdatum, op de op de factuur vermelde rekening. Bezwaren tegen de hoogte van de factuur schorten de betalingsverplichting niet op."
           data-en="The payment term is 30 days from the invoice date, into the account specified on the invoice. Objections to the amount invoiced do not suspend the obligation to pay."></p>
        <p data-nl="Bij niet-tijdige betaling is opdrachtgever van rechtswege in verzuim, zonder dat een nadere ingebrekestelling is vereist. Dams Development is alsdan gerechtigd de wettelijke handelsrente (artikel 6:119a BW) in rekening te brengen, vermeerderd met buitengerechtelijke incassokosten conform de Wet Incassokosten (WIK)."
           data-en="If payment is not made in time, the client is in default by operation of law, without any further notice of default being required. Dams Development is then entitled to charge statutory commercial interest (Article 6:119a Dutch Civil Code), plus extrajudicial collection costs in accordance with the Dutch Collection Costs Act (WIK)."></p>
        <p data-nl="Dams Development is bij niet-tijdige betaling gerechtigd haar werkzaamheden op te schorten totdat het volledige openstaande bedrag is voldaan, zonder dat dit aanleiding kan geven tot enige vorm van schadevergoeding aan opdrachtgever."
           data-en="In the event of late payment, Dams Development is entitled to suspend its services until the outstanding amount has been paid in full, without this giving rise to any liability for damages to the client."></p>

        <h2 data-nl="8. Vertrouwelijkheid" data-en="8. Confidentiality"></h2>
        <p data-nl="Beide partijen zijn verplicht tot geheimhouding van alle vertrouwelijke informatie die zij in het kader van de overeenkomst van elkaar of uit andere bron hebben verkregen. Informatie geldt als vertrouwelijk indien dit door de andere partij is medegedeeld of indien dit voortvloeit uit de aard van de informatie."
           data-en="Both parties are obliged to maintain confidentiality of all confidential information obtained from one another or from other sources in connection with the agreement. Information qualifies as confidential if it has been designated as such, or if its confidential nature follows from the nature of the information itself."></p>
        <p data-nl="Deze geheimhoudingsplicht geldt niet voor informatie die reeds publiekelijk bekend is, die rechtmatig van een derde is verkregen, of waarvan openbaarmaking op grond van de wet of een rechterlijk bevel verplicht is."
           data-en="This duty of confidentiality does not apply to information that is already publicly known, that has been lawfully obtained from a third party, or whose disclosure is required by law or by court order."></p>

        <h2 data-nl="9. Intellectueel eigendom" data-en="9. Intellectual property"></h2>
        <p data-nl="Alle rechten van intellectueel eigendom op door Dams Development ontwikkelde of ter beschikking gestelde resultaten berusten uitsluitend bij Dams Development, tenzij anders schriftelijk overeengekomen."
           data-en="All intellectual property rights in deliverables developed or made available by Dams Development rest exclusively with Dams Development, unless agreed otherwise in writing."></p>
        <p data-nl="Na volledige betaling van de overeengekomen vergoeding verkrijgt opdrachtgever een niet-exclusief, eeuwigdurend en wereldwijd gebruiksrecht op het resultaat voor gebruik binnen de eigen onderneming. Overdracht van eigendom van intellectuele eigendomsrechten vindt uitsluitend plaats indien dit uitdrukkelijk en schriftelijk is overeengekomen."
           data-en="Upon full payment of the agreed fee, the client obtains a non-exclusive, perpetual, worldwide right of use to the deliverable for use within its own organisation. Transfer of ownership of intellectual property rights takes place only if expressly agreed in writing."></p>
        <p data-nl="Dams Development behoudt het recht om generieke kennis, vaardigheden, methoden, ideeën, technieken en componenten die bij de uitvoering van de overeenkomst zijn verworven of ontwikkeld, ook voor andere opdrachtgevers in te zetten, mits geen vertrouwelijke informatie van opdrachtgever wordt geopenbaard."
           data-en="Dams Development reserves the right to use generic knowledge, skills, methods, ideas, techniques, and components acquired or developed during performance of the agreement for other clients as well, provided no confidential information of the client is disclosed."></p>
        <p data-nl="Het is opdrachtgever niet toegestaan zonder voorafgaande schriftelijke toestemming van Dams Development het resultaat te verveelvoudigen, openbaar te maken of door te leveren aan derden."
           data-en="The client may not reproduce, publish, or transfer the deliverable to third parties without prior written consent from Dams Development."></p>

        <h2 data-nl="10. Persoonsgegevens en AVG" data-en="10. Personal data and GDPR"></h2>
        <p data-nl="Indien bij de uitvoering van de overeenkomst persoonsgegevens worden verwerkt in de zin van de Algemene Verordening Gegevensbescherming (AVG), kwalificeert opdrachtgever doorgaans als verwerkingsverantwoordelijke en Dams Development als verwerker."
           data-en="Where personal data within the meaning of the General Data Protection Regulation (GDPR) is processed in performing the agreement, the client typically qualifies as the data controller and Dams Development as the data processor."></p>
        <p data-nl="In dat geval sluiten partijen voorafgaand aan de verwerking een verwerkersovereenkomst, waarin de afspraken over verwerking, beveiliging en datalekken worden vastgelegd conform artikel 28 AVG."
           data-en="In that case, the parties shall conclude a data processing agreement before processing begins, setting out the arrangements regarding processing, security, and data breaches in accordance with Article 28 GDPR."></p>
        <p data-nl="Dams Development treft passende technische en organisatorische maatregelen ter beveiliging van persoonsgegevens en zal opdrachtgever onverwijld informeren over een datalek dat redelijkerwijs nadelige gevolgen kan hebben voor betrokkenen."
           data-en="Dams Development shall take appropriate technical and organisational measures to secure personal data and shall notify the client without undue delay of any data breach that may reasonably affect data subjects."></p>

        <h2 data-nl="11. Aansprakelijkheid" data-en="11. Liability"></h2>
        <p data-nl="Dams Development is uitsluitend aansprakelijk voor directe schade die het rechtstreekse gevolg is van een toerekenbare tekortkoming in de uitvoering van de overeenkomst."
           data-en="Dams Development is liable only for direct damage that is the direct result of an attributable failure in the performance of the agreement."></p>
        <p data-nl="De totale aansprakelijkheid van Dams Development uit hoofde van de overeenkomst is beperkt tot maximaal het bedrag dat in de drie (3) maanden voorafgaand aan de schadeveroorzakende gebeurtenis door opdrachtgever aan Dams Development is betaald (exclusief BTW), met een absoluut maximum van &euro; 25.000,&minus; per gebeurtenis. Een reeks van samenhangende gebeurtenissen geldt als één gebeurtenis."
           data-en="Dams Development&rsquo;s total liability under the agreement is limited to the amount paid by the client to Dams Development (excluding VAT) in the three (3) months preceding the event giving rise to the damage, with an absolute maximum of &euro; 25,000 per event. A series of connected events counts as a single event."></p>
        <p data-nl="Aansprakelijkheid van Dams Development voor indirecte schade is uitgesloten. Hieronder wordt onder meer begrepen: gevolgschade, gederfde winst, gemiste besparingen, gemiste omzet, schade door bedrijfsstagnatie, verlies van gegevens en reputatieschade."
           data-en="Liability for indirect damage is excluded. This includes, without limitation: consequential damage, lost profits, missed savings, lost revenue, damage due to business interruption, loss of data, and reputational harm."></p>
        <p data-nl="De in dit artikel opgenomen beperkingen gelden niet indien de schade het gevolg is van opzet of bewuste roekeloosheid van Dams Development."
           data-en="The limitations in this article do not apply where the damage results from intent or wilful recklessness on the part of Dams Development."></p>
        <p data-nl="Iedere vordering van opdrachtgever vervalt indien deze niet binnen twaalf (12) maanden na ontdekking van de schadeveroorzakende gebeurtenis schriftelijk bij Dams Development is ingediend."
           data-en="Any claim by the client expires if it has not been submitted to Dams Development in writing within twelve (12) months of the client becoming aware of the event giving rise to the claim."></p>

        <h2 data-nl="12. Overmacht" data-en="12. Force majeure"></h2>
        <p data-nl="Onder overmacht wordt verstaan, naast hetgeen daaromtrent in de wet en jurisprudentie wordt begrepen, alle van buitenkomende oorzaken, voorzien of niet voorzien, waarop Dams Development geen invloed kan uitoefenen en die de uitvoering van de overeenkomst onmogelijk of onredelijk bezwaarlijk maken. Hieronder vallen onder meer: storingen of uitval bij internet- of cloudleveranciers, datalekken bij derden, ziekte, beperkingen door overheidswege en uitval van AI-diensten of API&rsquo;s."
           data-en="Force majeure means, in addition to what is understood as such by law and case law, all external causes, foreseen or unforeseen, beyond Dams Development&rsquo;s control that render performance of the agreement impossible or unreasonably onerous. This includes, among others: outages at internet or cloud providers, data breaches at third parties, illness, government-imposed restrictions, and unavailability of AI services or APIs."></p>
        <p data-nl="Tijdens overmacht worden de verplichtingen van Dams Development opgeschort. Indien de overmachtsperiode langer dan zestig (60) dagen duurt, zijn beide partijen bevoegd de overeenkomst te ontbinden, zonder dat een verplichting tot schadevergoeding ontstaat."
           data-en="During force majeure, Dams Development&rsquo;s obligations are suspended. If the force majeure period lasts longer than sixty (60) days, either party may dissolve the agreement, without any obligation to pay damages."></p>

        <h2 data-nl="13. Opzegging en beëindiging" data-en="13. Cancellation and termination"></h2>
        <p data-nl="Opdrachten voor bepaalde tijd of voor een afgebakend resultaat zijn niet tussentijds opzegbaar, tenzij anders schriftelijk overeengekomen. Bij tussentijdse opzegging is opdrachtgever gehouden de tot dan toe verrichte werkzaamheden en gemaakte kosten volledig te vergoeden."
           data-en="Fixed-term assignments or assignments for a defined deliverable are not subject to interim cancellation unless agreed otherwise in writing. In the event of interim cancellation, the client is obliged to compensate Dams Development in full for work performed and costs incurred up to that point."></p>
        <p data-nl="Opdrachten voor onbepaalde tijd kunnen door beide partijen schriftelijk worden opgezegd met inachtneming van een opzegtermijn van één (1) maand."
