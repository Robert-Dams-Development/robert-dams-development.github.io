    <main>
        <section class="exp-section">
            <div class="exp-block">
                <h2 data-nl="Situatie" data-en="Situation"></h2>
                <p data-nl="ASML is 's werelds toonaangevende fabrikant van lithografiemachines voor de chipindustrie. Binnen hun YieldStar-divisie (een kwaliteitsmeetmachine voor wafers) was een terugkerend probleem: elke keer dat een nieuw KPI aan het rapportagesysteem moest worden toegevoegd, kostte dat een developer gemiddeld twee weken. De oorzaak lag in de omvangrijke, sterk verouderde codebase van YieldStar, waarbij elke KPI-toevoeging op meerdere plekken handmatige aanpassingen vereiste."
                   data-en="ASML is the world's leading manufacturer of lithography machines for the chip industry. Within their YieldStar division (a quality measurement machine for wafers) there was a recurring problem: every time a new KPI needed to be added to the reporting system, it took a developer an average of two weeks. The cause lay in YieldStar's large, heavily legacy codebase, where each KPI addition required manual changes in multiple places."></p>
            </div>
            <div class="exp-block">
                <h2 data-nl="Opdracht" data-en="Task"></h2>
                <p data-nl="Mijn stagedopdracht was het ontwerpen en bouwen van een Reporting Automation Tool (RAT) die de toevoeging van nieuwe KPI's kon automatiseren. De tool moest codegeneratie ondersteunen en de foutgevoeligheid van het handmatige proces terugdringen."
                   data-en="My internship assignment was to design and build a Reporting Automation Tool (RAT) that could automate the addition of new KPIs. The tool needed to support code generation and reduce the error-proneness of the manual process."></p>
            </div>
            <div class="exp-block">
                <h2 data-nl="Aanpak" data-en="Approach"></h2>
                <p data-nl="Ik ontwierp en bouwde RAT als een desktop-applicatie in C# en WPF. De tool genereerde automatisch de benodigde code voor nieuwe KPI's in alle ondersteunde rapportageformaten: CSV, ADEL en XML. Parallel hieraan refactorde ik de YieldStar-codebase op de plekken waar nieuwe KPI's worden toegevoegd, zodat RAT de code optimaal kon genereren. De meest gebruikte KPI-typen werden gestandaardiseerd, waarna RAT de release haalde en in productie werd genomen."
                   data-en="I designed and built RAT as a desktop application in C# and WPF. The tool automatically generated the required code for new KPIs across all supported reporting formats: CSV, ADEL, and XML. In parallel, I refactored the YieldStar codebase at the points where new KPIs are added, enabling RAT to generate code optimally. The most common KPI types were standardised, after which RAT reached release and was taken into production."></p>
            </div>
            <div class="exp-block">
                <h2 data-nl="Resultaat" data-en="Result"></h2>
                <p data-nl="RAT werd na de stageperiode actief overgenomen en gebruikt door het Reporting-team van ASML. De tijd die nodig is om een nieuwe KPI toe te voegen werd drastisch verminderd: van gemiddeld twee weken naar een fractie daarvan. De tool verminderde tevens de foutmarge aanzienlijk doordat handmatige, foutgevoelige stappen werden geautomatiseerd."
                   data-en="RAT was adopted and actively used by ASML's Reporting team after the internship period. The time required to add a new KPI was drastically reduced: from an average of two weeks to a fraction of that. The tool also significantly reduced the error margin by automating manual, error-prone steps."></p>
            </div>
        </section>
