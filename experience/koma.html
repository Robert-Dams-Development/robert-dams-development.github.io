    <main>
        <section class="exp-section">
            <div class="exp-block">
                <h2 data-nl="Situatie" data-en="Situation"></h2>
                <p data-nl="Koma is een Nederlands bedrijf dat al sinds 1938 gespecialiseerd is in industriële en commerciële koelinstallaties. Een groot deel van hun softwareteam ging met pensioen, waardoor er een kritisch kennisgat ontstond rondom de besturingssoftware KControl, een complex systeem gebouwd in C++ en Java dat de koelinstallaties aanstuurt. Het resterende team had behoefte aan iemand die de bestaande software kon doorgronden, documenteren en stabiliseren."
                   data-en="Koma is a Dutch company specialising in industrial and commercial refrigeration solutions since 1938. A large part of their software team retired, creating a critical knowledge gap around the control software KControl, a complex system built in C++ and Java that manages the refrigeration units. The remaining team needed someone to understand, document, and stabilise the existing software."></p>
            </div>
            <div class="exp-block">
                <h2 data-nl="Opdracht" data-en="Task"></h2>
                <p data-nl="Mijn opdracht was om de bestaande softwarecode te documenteren, de aanwezige problemen in de legacy-software te identificeren en te verhelpen. Koma had geen formele ontwikkelmethodologie, wat betekende dat ik zelf structuur moest aanbrengen in het proces."
                   data-en="My task was to document the existing software code, identify and fix the issues present in the legacy software. Koma had no formal development methodology, which meant I had to introduce structure into the process myself."></p>
            </div>
            <div class="exp-block">
                <h2 data-nl="Aanpak" data-en="Approach"></h2>
                <p data-nl="Wat begon als documentatiewerk groeide uit tot een uitgebreide refactoring van de codebase. Ik identificeerde en dichtte beveiligingslekken, verbeterde de prestaties op kritieke plekken en moderniseerde de build-pipeline door Apache Ant te vervangen door Maven. Naast de technische werkzaamheden stelde ik IT-documentatie op voor veelvoorkomende fouten en hoe deze te verhelpen."
                   data-en="What began as documentation work evolved into a comprehensive refactoring of the codebase. I identified and patched security vulnerabilities, improved performance at critical points, and modernised the build pipeline by replacing Apache Ant with Maven. Alongside the technical work, I produced IT documentation for common errors and how to resolve them."></p>
            </div>
            <div class="exp-block">
                <h2 data-nl="Resultaat" data-en="Result"></h2>
                <p data-nl="De KControl-codebase volledig gedocumenteerd en gestabiliseerd. Beveiligingslekken gedicht en prestatieverbeteringen doorgevoerd die de betrouwbaarheid van de koelbesturing verhoogden. Het IT-team uitgerust met handleidingen voor veelvoorkomende problemen, waardoor de afhankelijkheid van externe ondersteuning significant daalde."
                   data-en="The KControl codebase fully documented and stabilised. Security vulnerabilities patched and performance improvements implemented that increased the reliability of refrigeration control. The IT team equipped with guides for common issues, significantly reducing dependency on external support."></p>
            </div>
        </section>
