    <main>
        <section class="exp-section">
            <div class="exp-block">
                <h2 data-nl="Situatie" data-en="Situation"></h2>
                <p data-nl="Baxter is een multinationaal zorgbedrijf gespecialiseerd in medische producten zoals IV-oplossingen, infusiesystemen en renale producten. Binnen hun softwareteam (4 engineers, 2 testers en 1 architect) werd ik ingeschakeld als externe consultant. Het team werkte aan FDS-II, een intern platform voor productbeheer, en had behoefte aan versterking met C#-expertise naast de bestaande Visual Basic-kennis."
                   data-en="Baxter is a multinational healthcare company specialising in medical products such as IV solutions, infusion systems, and renal products. Within their software team (4 engineers, 2 testers, and 1 architect) I was brought in as an external consultant. The team worked on FDS-II, an internal product management platform, and needed reinforcement with C# expertise alongside the existing Visual Basic knowledge."></p>
            </div>
            <div class="exp-block">
                <h2 data-nl="Opdracht" data-en="Task"></h2>
                <p data-nl="Mijn primaire taak was het meewerken aan nieuwe features en bugfixes in het FDS-II platform. Naarmate ik meer vertrouwd raakte met de codebase, groeide mijn rol van ondersteunende developer naar het zelfstandig initiëren en uitvoeren van nieuwe projecten, inclusief het herzien van de architecturele grondslagen van het systeem."
                   data-en="My primary task was to contribute to new features and bug fixes in the FDS-II platform. As I became more familiar with the codebase, my role grew from supporting developer to independently initiating and executing new projects, including revising the architectural foundations of the system."></p>
            </div>
            <div class="exp-block">
                <h2 data-nl="Aanpak" data-en="Approach"></h2>
                <p data-nl="Ik analyseerde de bestaande architectuur en stelde voor de 20 onderling verweven applicaties te consolideren tot een centrale infrastructuurlaag. Vervolgens ontwierp en implementeerde ik deze laag, waarbij ik de communicatie tussen applicaties via SignalR en een .NET API standaardiseerde. Ik begeleidde ook de systematische migratie van legacy-applicaties naar het nieuwe model."
                   data-en="I analysed the existing architecture and proposed consolidating the 20 tightly coupled applications into a central infrastructure layer. I then designed and implemented this layer, standardising inter-application communication via SignalR and a .NET API. I also guided the systematic migration of legacy applications to the new model."></p>
            </div>
            <div class="exp-block">
                <h2 data-nl="Resultaat" data-en="Result"></h2>
                <p data-nl="20 onderling verweven applicaties teruggebracht naar 2 kerncomponenten, waardoor onderhoud en uitbreiding aanzienlijk eenvoudiger werden. Een nieuwe FDS-II infrastructuurlaag ontwikkeld en live gezet. De legacy-applicaties werden systematisch geassimileerd in het nieuwe model, wat de technische schuld van het team drastisch verminderde."
                   data-en="20 tightly coupled applications consolidated into 2 core components, making maintenance and extension significantly simpler. A new FDS-II infrastructure layer developed and deployed. Legacy applications were systematically assimilated into the new model, drastically reducing the team's technical debt."></p>
            </div>
        </section>
