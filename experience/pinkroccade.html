    <main>
        <section class="exp-section">
            <div class="exp-block">
                <h2 data-nl="Situatie" data-en="Situation"></h2>
                <p data-nl="PinkRoccade is een toonaangevende IT-dienstverlener gespecialiseerd in software voor de Nederlandse publieke sector. Binnen hun productteam werkte ik mee aan iSuite Sociaal Portaal, een modern SaaS-platform dat gemeenten ondersteunt bij het beheer van sociale dienstverlening en uitkeringen. Het platform verving een verouderd systeem en werd van de grond af opgebouwd."
                   data-en="PinkRoccade is a leading IT service provider specialising in software for the Dutch public sector. Within their product team, I contributed to iSuite Sociaal Portaal, a modern SaaS platform supporting municipalities in managing social services and welfare programs. The platform replaced a legacy system and was built from the ground up."></p>
            </div>
            <div class="exp-block">
                <h2 data-nl="Opdracht" data-en="Task"></h2>
                <p data-nl="Als junior software engineer was ik verantwoordelijk voor het implementeren van kernfunctionaliteit in het platform. Naarmate ik groeide in de rol, raakte ik steeds meer betrokken bij het ontwerpen en ontwikkelen van API's. Daarnaast werd ik gevraagd de rol van Scrum Master op me te nemen om het team en de sprintprocessen te structureren."
                   data-en="As a junior software engineer I was responsible for implementing core functionality in the platform. As I grew in the role, I became increasingly involved in designing and developing APIs. I was also asked to take on the Scrum Master role to structure the team and sprint processes."></p>
            </div>
            <div class="exp-block">
                <h2 data-nl="Aanpak" data-en="Approach"></h2>
                <p data-nl="Ik ontwierp en implementeerde meerdere API's voor de gemeentelijke dienstverlening, verfijnde bestaande systemen en speelde een actieve rol in de ontwikkeling van kernfunctionaliteit. Als Scrum Master structureerde ik sprintsessies, retrospectives en de samenwerking met het QA-team. Aanvullend behaalde ik het Software Architecture-certificaat (Vijfhart) om mijn technische bijdrage te verdiepen."
                   data-en="I designed and implemented multiple APIs for the municipal services domain, refined existing systems, and played an active role in developing core functionality. As Scrum Master I structured sprint sessions, retrospectives, and collaboration with the QA team. I also obtained the Software Architecture certificate (Vijfhart) to deepen my technical contribution."></p>
            </div>
            <div class="exp-block">
                <h2 data-nl="Resultaat" data-en="Result"></h2>
                <p data-nl="Talrijke API's ontworpen en geïmplementeerd die nu actief in productie draaien voor tientallen Nederlandse gemeenten. Het QA-team succesvol geïntegreerd in het sprintproces, wat leidde tot kortere feedbackcycli en minder productiefouten. De combinatie van een Software Architecture-certificaat en PSM I versterkte zowel mijn technische als procesmatige bijdrage aan het team."
                   data-en="Designed and implemented numerous APIs now actively running in production for dozens of Dutch municipalities. Successfully integrated the QA team into the sprint process, resulting in shorter feedback cycles and fewer production errors. The combination of a Software Architecture certificate and PSM I strengthened both my technical and process contributions to the team."></p>
            </div>
        </section>
